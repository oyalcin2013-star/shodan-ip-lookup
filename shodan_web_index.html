<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕵️ Shodan IP Lookup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #1a1a2e;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: monospace;
        }
        
        input:focus {
            outline: none;
            border-color: #0099ff;
            box-shadow: 0 0 10px rgba(0, 153, 255, 0.2);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0099ff 0%, #0077cc 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 153, 255, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .results {
            margin-top: 30px;
            padding: 25px;
            background: #f0f8ff;
            border-radius: 15px;
            border-left: 5px solid #0099ff;
            display: none;
        }
        
        .results.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-item {
            margin: 15px 0;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #0099ff;
        }
        
        .result-label {
            font-weight: bold;
            color: #0099ff;
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .result-value {
            color: #333;
            font-size: 16px;
            font-family: monospace;
            word-break: break-all;
        }
        
        .error {
            color: #d32f2f;
            padding: 18px;
            background: #ffebee;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            border-left: 5px solid #d32f2f;
        }
        
        .error.show {
            display: block;
        }
        
        .loading {
            text-align: center;
            color: #0099ff;
            display: none;
            font-weight: bold;
            margin-top: 15px;
            font-size: 16px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0099ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            input, button {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕵️ Shodan IP Lookup</h1>
        <p class="subtitle">IP adresini sorgula ve detaylı bilgi al</p>
        
        <div class="input-group">
            <label for="ipInput">IP Adresi Gir:</label>
            <input type="text" id="ipInput" placeholder="Örneğin: 8.8.8.8" value="8.8.8.8">
        </div>
        
        <button onclick="searchIP()">🔍 Ara</button>
        
        <div class="loading" id="loading">
            <span class="spinner"></span>
            Aranıyor...
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="results" id="results"></div>
    </div>
    
    <script>
        const API_KEY = "SHfu88agJkbKbXcR7sCpkD32n2dvlDvh";
        
        async function searchIP() {
            const ip = document.getElementById("ipInput").value.trim();
            const resultsDiv = document.getElementById("results");
            const errorDiv = document.getElementById("error");
            const loadingDiv = document.getElementById("loading");
            
            resultsDiv.innerHTML = "";
            resultsDiv.classList.remove("show");
            errorDiv.innerHTML = "";
            errorDiv.classList.remove("show");
            loadingDiv.classList.add("show");
            
            if (!ip) {
                errorDiv.innerHTML = "❌ Lütfen bir IP adresi gir";
                errorDiv.classList.add("show");
                loadingDiv.classList.remove("show");
                return;
            }
            
            try {
                const response = await fetch(`https://api.shodan.io/shodan/host/${ip}?key=${API_KEY}`);
                
                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error("❌ API key geçersiz");
                    }
                    if (response.status === 404) {
                        throw new Error("❌ Bu IP bulunamadı");
                    }
                    throw new Error("❌ Hata oluştu, lütfen tekrar dene");
                }
                
                const data = await response.json();
                
                let html = `
                    <div class="result-item">
                        <span class="result-label">📍 IP Adresi</span>
                        <span class="result-value">${data.ip_str}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">🌍 Ülke</span>
                        <span class="result-value">${data.country_name || "Bilinmiyor"}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">🏙️ Şehir</span>
                        <span class="result-value">${data.city || "Bilinmiyor"}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">🔗 İnternet Sağlayıcı</span>
                        <span class="result-value">${data.org || "Bilinmiyor"}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">🔌 Açık Portlar</span>
                        <span class="result-value">${data.ports ? data.ports.join(", ") : "Açık port yok"}</span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">📊 Toplam Hizmet</span>
                        <span class="result-value">${data.total || 0}</span>
                    </div>
                `;
                
                if (data.latitude && data.longitude) {
                    html += `
                        <div class="result-item">
                            <span class="result-label">📍 Koordinatlar</span>
                            <span class="result-value">${data.latitude.toFixed(4)}, ${data.longitude.toFixed(4)}</span>
                        </div>
                    `;
                }
                
                if (data.data && data.data.length > 0) {
                    html += `
                        <div class="result-item">
                            <span class="result-label">🔍 İlk 3 Hizmet</span>
                    `;
                    for (let i = 0; i < Math.min(3, data.data.length); i++) {
                        const banner = data.data[i];
                        html += `<span class="result-value">Port ${banner.port}: ${banner.product || "Bilinmiyor"} ${banner.version || ""}</span><br>`;
                    }
                    html += `</div>`;
                }
                
                resultsDiv.innerHTML = html;
                resultsDiv.classList.add("show");
                
            } catch (error) {
                errorDiv.innerHTML = error.message;
                errorDiv.classList.add("show");
            } finally {
                loadingDiv.classList.remove("show");
            }
        }
        
        document.getElementById("ipInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchIP();
        });
    </script>
</body>
</html>
